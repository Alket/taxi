# Dev stack: Postgres + Next.js with hot reload (bind-mounted source).
# Uses volume taxi_pg_data_dev (NOT Dropflow :5433, NOT prod taxi_pg_data).
# Does NOT seed on start.
# Usage:
#   docker compose -f docker-compose.dev.yml up --build -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taxi}
    volumes:
      - taxi_pg_data_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taxi}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22-bookworm-slim
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-taxi}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:ops@transfers.co}
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - taxi_node_modules:/app/node_modules
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends openssl ca-certificates >/dev/null
      && npm ci
      && npx prisma migrate deploy
      && npx prisma generate
      && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  taxi_pg_data_dev:
  taxi_node_modules:
